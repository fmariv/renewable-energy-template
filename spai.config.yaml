project: renewable-energy-template
storage:
  - name: data
    type: s3
scripts:
  - name: renewable-energy
    run_on_start: true
    workdir: /app2 # useful also when using custom Dockerfile (no image)
    image: europe-west1-docker.pkg.dev/spai-430907/spai-build-staging/renewable-energy-script:v0
apis:
  - name: api
    port: 8021
    host: localhost
    autoscaling:
      min: 1
      max: 1
      keep_alive: 60
uis:
  - name: map
    # command: npm run dev # for local development
    command: npm run deploy
    port: 5173
    runtime: node
    autoscaling:
      min: 1
      max: 1
      keep_alive: 60
    env:
      API_URL: api.api
